apiVersion: apps/v1
kind: Deployment
metadata:
  name: points-engine
  namespace: osprey
  labels:
    app: points-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: points-engine
  template:
    metadata:
      labels:
        app: points-engine
    spec:
      containers:
        - name: points-engine
          image: osprey-loyalty-points-engine:latest
          imagePullPolicy: Never # kind: image is side-loaded
          ports:
            - containerPort: 8082
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317
            - name: OTEL_SERVICE_NAME
              value: points-engine
            # Off the request path — left auth-off in k8s (see ADR-0007).
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: points-engine
  namespace: osprey
  labels:
    app: points-engine
spec:
  type: ClusterIP
  selector:
    app: points-engine
  ports:
    - port: 8082
      targetPort: 8082
