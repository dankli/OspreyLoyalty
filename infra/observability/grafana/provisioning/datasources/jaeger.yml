apiVersion: 1

datasources:
  - name: Jaeger
    type: jaeger
    uid: osprey-jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false
    jsonData:
      # Jump from a trace to its logs in Loki via the shared traceId label.
      tracesToLogsV2:
        datasourceUid: osprey-loki
        filterByTraceID: true
        tags: [{ key: "traceId", value: "traceId" }]
