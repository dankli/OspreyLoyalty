name: member-portal
on:
  push:
    branches: [main]
    paths: ["frontends/member-portal/**", "services/gateway/schema.graphql", ".github/workflows/member-portal.yml"]
  pull_request:
    paths: ["frontends/member-portal/**", "services/gateway/schema.graphql", ".github/workflows/member-portal.yml"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: frontends/member-portal }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run codegen
      - run: git diff --exit-code -- src/gql
      - run: npm test
      - run: npm run build
