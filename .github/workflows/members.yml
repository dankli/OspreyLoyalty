name: members
on:
  push:
    branches: [main]
    paths: ["services/members/**", ".github/workflows/members.yml"]
  pull_request:
    paths: ["services/members/**", ".github/workflows/members.yml"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet test services/members --nologo
