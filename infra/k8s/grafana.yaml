apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: osprey
  labels:
    app: grafana
data:
  # Mirrors infra/observability/grafana/provisioning/datasources — URLs match k8s service names.
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: osprey-prom
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
  loki.yml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: osprey-loki
        access: proxy
        url: http://loki:3100
        editable: false
        jsonData:
          derivedFields:
            # Matches both the raw JSON body ("traceId":"...") and our line_format'd view (traceId=...),
            # and links to the Trace-detail dashboard (a Jaeger trace panel) rather than Explore.
            - name: TraceID
              matcherType: regex
              matcherRegex: '(?:traceId=|"[Tt]race[_]?[Ii]d":"?)([0-9a-f]{16,32})'
              url: "/d/osprey-trace/osprey-trace-detail?var-traceId=$${__value.raw}&$${__url_time_range}"
              urlDisplayLabel: "Open trace dashboard"
  jaeger.yml: |
    apiVersion: 1
    datasources:
      - name: Jaeger
        type: jaeger
        uid: osprey-jaeger
        access: proxy
        url: http://jaeger:16686
        editable: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: osprey-loki
            filterByTraceID: true
            tags: [{ key: "traceId", value: "traceId" }]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: osprey
  labels:
    app: grafana
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: osprey
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: osprey
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - name: http
              containerPort: 3000
          env:
            # Demo: open anonymously as Admin (no login), admin/admin still works.
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: osprey
  labels:
    app: grafana
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
