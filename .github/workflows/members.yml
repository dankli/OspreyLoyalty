name: members
on:
  push:
    branches: [main]
    paths: ["services/members/**", ".github/workflows/members.yml"]
  pull_request:
    paths: ["services/members/**", ".github/workflows/members.yml"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
      - run: dotnet format services/members/Osprey.Members.sln --verify-no-changes
      - run: dotnet test services/members --nologo
