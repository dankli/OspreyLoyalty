apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: osprey
  labels:
    app: rabbitmq
spec:
  serviceName: rabbitmq # headless Service below — stable DNS identity (rabbitmq-0)
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      securityContext:
        fsGroup: 999 # make the PVC writable by the rabbitmq group (the image runs as uid/gid 999)
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672
            - containerPort: 15672
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
          # `rabbitmq-diagnostics ping` spins up its own Erlang VM and is slow on a busy node;
          # give the broker a generous startup window so liveness never kills it mid-boot.
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: osprey
  labels:
    app: rabbitmq
spec:
  clusterIP: None # headless: required by the StatefulSet; clients still resolve rabbitmq:5672
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
