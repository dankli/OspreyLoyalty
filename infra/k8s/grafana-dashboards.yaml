apiVersion: v1
data:
  osprey-logs-domain.json: |
    {
      "uid": "osprey-logs-domain",
      "title": "Osprey — Domain logs",
      "tags": ["osprey", "logs"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "service",
            "label": "Service",
            "type": "query",
            "datasource": { "type": "loki", "uid": "osprey-loki" },
            "query": "label_values(service)",
            "regex": "/^(members|gateway|partners|security|points-engine)$/",
            "sort": 1,
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": { "text": "All", "value": "$__all" }
          },
          {
            "name": "level",
            "label": "Level",
            "type": "custom",
            "query": "ERROR,WARN,INFO,DEBUG,TRACE,FATAL",
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": { "text": "All", "value": "$__all" }
          },
          {
            "name": "search",
            "label": "Search (regex, case-insensitive)",
            "type": "textbox",
            "query": "",
            "current": { "text": "", "value": "" }
          },
          {
            "name": "traceId",
            "label": "Trace ID",
            "type": "textbox",
            "query": "",
            "current": { "text": "", "value": "" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Log volume by service",
          "type": "timeseries",
          "datasource": { "type": "loki", "uid": "osprey-loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "fillOpacity": 40, "stacking": { "mode": "normal" } } } },
          "targets": [
            {
              "refId": "A",
              "editorMode": "code",
              "queryType": "range",
              "expr": "sum by (service) (count_over_time({namespace=\"osprey\", service=~\"$service\"} [$__auto]))",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Warnings & errors by service",
          "type": "timeseries",
          "datasource": { "type": "loki", "uid": "osprey-loki" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "fillOpacity": 40, "stacking": { "mode": "normal" } }, "color": { "mode": "fixed", "fixedColor": "red" } } },
          "targets": [
            {
              "refId": "A",
              "editorMode": "code",
              "queryType": "range",
              "expr": "sum by (service) (count_over_time({namespace=\"osprey\", service=~\"$service\", level=~\"(?i).*(error|warn).*|40|50\"} [$__auto]))",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Logs — filter with Level / Search / Trace ID above; click a line's TraceID to open the trace dashboard",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "osprey-loki" },
          "gridPos": { "h": 15, "w": 24, "x": 0, "y": 8 },
          "options": {
            "showTime": true,
            "wrapLogMessage": true,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          },
          "targets": [
            {
              "refId": "A",
              "editorMode": "code",
              "queryType": "range",
              "expr": "{namespace=\"osprey\", service=~\"$service\"} |~ `(?i)$search` |~ `(?i)$traceId` | json | label_format lvl=`{{ $l := lower (or .level .LogLevel .severity .s \"\") }}{{ if or (hasPrefix \"err\" $l) (eq $l \"50\") }}ERROR{{ else if or (hasPrefix \"warn\" $l) (eq $l \"40\") }}WARN{{ else if or (hasPrefix \"info\" $l) (eq $l \"30\") (eq $l \"i\") }}INFO{{ else if or (hasPrefix \"debug\" $l) (eq $l \"20\") }}DEBUG{{ else if or (hasPrefix \"trace\" $l) (eq $l \"10\") }}TRACE{{ else if or (hasPrefix \"fatal\" $l) (eq $l \"60\") }}FATAL{{ else }}{{ upper $l }}{{ end }}` | lvl=~`$level` | regexp `(?i)trace[_]?id[\"\\s:=]+(?P<tid>[0-9a-f]{16,32})` | line_format `{{with .lvl}}{{printf \"%-5s\" .}} {{end}}{{.service}}: {{or .Message .message .msg .fields_message __line__}}{{with .tid}}  traceId={{.}}{{end}}` | drop __error__, __error_details__"
            }
          ]
        }
      ]
    }
  osprey-logs-infra.json: |
    {
      "uid": "osprey-logs-infra",
      "title": "Osprey — Infrastructure logs",
      "tags": ["osprey", "logs"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "service",
            "label": "Service",
            "type": "query",
            "datasource": { "type": "loki", "uid": "osprey-loki" },
            "query": "label_values(service)",
            "regex": "/^(?!(?:members|gateway|partners|security|points-engine)$)(.+)$/",
            "sort": 1,
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": { "text": "All", "value": "$__all" }
          },
          {
            "name": "level",
            "label": "Level",
            "type": "custom",
            "query": "ERROR,WARN,INFO,DEBUG,TRACE,FATAL",
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": { "text": "All", "value": "$__all" }
          },
          {
            "name": "search",
            "label": "Search (regex, case-insensitive)",
            "type": "textbox",
            "query": "",
            "current": { "text": "", "value": "" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Log volume by component",
          "type": "timeseries",
          "datasource": { "type": "loki", "uid": "osprey-loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "fillOpacity": 40, "stacking": { "mode": "normal" } } } },
          "targets": [
            {
              "refId": "A",
              "editorMode": "code",
              "queryType": "range",
              "expr": "sum by (service) (count_over_time({namespace=\"osprey\", service=~\"$service\"} [$__auto]))",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error / warning lines by component (matched in the log body)",
          "type": "timeseries",
          "datasource": { "type": "loki", "uid": "osprey-loki" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "fillOpacity": 40, "stacking": { "mode": "normal" } }, "color": { "mode": "fixed", "fixedColor": "red" } } },
          "targets": [
            {
              "refId": "A",
              "editorMode": "code",
              "queryType": "range",
              "expr": "sum by (service) (count_over_time({namespace=\"osprey\", service=~\"$service\"} |~ `(?i)\\b(error|err|warn|fatal|panic)\\b` [$__auto]))",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Logs — filter with Level / Search above (databases, broker, observability stack, gateways & frontends)",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "osprey-loki" },
          "gridPos": { "h": 15, "w": 24, "x": 0, "y": 8 },
          "options": {
            "showTime": true,
            "wrapLogMessage": true,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          },
          "targets": [
            {
              "refId": "A",
              "editorMode": "code",
              "queryType": "range",
              "expr": "{namespace=\"osprey\", service=~\"$service\"} |~ `(?i)$search` | json | label_format lvl=`{{ $l := lower (or .level .LogLevel .severity .s \"\") }}{{ if or (hasPrefix \"err\" $l) (eq $l \"50\") }}ERROR{{ else if or (hasPrefix \"warn\" $l) (eq $l \"40\") }}WARN{{ else if or (hasPrefix \"info\" $l) (eq $l \"30\") (eq $l \"i\") }}INFO{{ else if or (hasPrefix \"debug\" $l) (eq $l \"20\") }}DEBUG{{ else if or (hasPrefix \"trace\" $l) (eq $l \"10\") }}TRACE{{ else if or (hasPrefix \"fatal\" $l) (eq $l \"60\") }}FATAL{{ else }}{{ upper $l }}{{ end }}` | lvl=~`$level` | line_format `{{with .lvl}}{{printf \"%-5s\" .}} {{end}}{{.service}}: {{or .Message .message .msg .fields_message __line__}}` | drop __error__, __error_details__"
            }
          ]
        }
      ]
    }
