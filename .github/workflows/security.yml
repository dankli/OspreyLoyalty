name: security
on:
  push:
    branches: [main]
    paths: ["services/security/**", ".github/workflows/security.yml"]
  pull_request:
    paths: ["services/security/**", ".github/workflows/security.yml"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: services/security }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - run: ./mvnw -q test
