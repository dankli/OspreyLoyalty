apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: osprey
  labels:
    app: alertmanager
data:
  # Mirrors infra/observability/alertmanager.yml — a demo route with a
  # placeholder webhook + null receiver and one inhibition rule. Nobody is
  # actually paged. See ADR-0013.
  alertmanager.yml: |
    route:
      group_by: ["alertname", "service", "job"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "null"
      routes:
        - matchers:
            - severity = "critical"
          receiver: "webhook"
    receivers:
      - name: "null"
      - name: "webhook"
        webhook_configs:
          - url: "http://127.0.0.1:5001/alerts"
            send_resolved: true
    inhibit_rules:
      - source_matchers:
          - alertname = "TargetDown"
        target_matchers:
          - severity =~ "warning|critical"
        equal: ["job"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: osprey
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args: ["--config.file=/etc/alertmanager/alertmanager.yml"]
          ports:
            - name: http
              containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              # request == limit memory: Alertmanager's footprint is small and
              # steady, so pinning it avoids the pod being a noisy-neighbour
              # memory grower (matches the recent backend change).
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: osprey
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  selector:
    app: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
