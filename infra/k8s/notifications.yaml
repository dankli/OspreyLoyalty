apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
  namespace: osprey
  labels:
    app: notifications
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: notifications
          image: osprey-loyalty-notifications:latest
          imagePullPolicy: Never # kind: image is side-loaded
          ports:
            - containerPort: 8084
          env:
            - name: RABBITMQ_HOST
              valueFrom:
                secretKeyRef: { name: osprey-datastores, key: rabbitmq-host }
            - name: MEMBERS_URL
              value: http://members:8080
            - name: SMTP_URL
              value: smtp://mailpit:1025
            - name: PORT
              value: "8084"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: OTEL_SERVICE_NAME
              value: notifications
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000 # the node image's non-root `node` user
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: notifications
  namespace: osprey
  labels:
    app: notifications
spec:
  type: ClusterIP
  selector:
    app: notifications
  ports:
    - port: 8084
      targetPort: 8084
