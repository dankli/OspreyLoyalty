type Member {
  id: ID!
  name: String!
  email: String!
  tier: String!
  qualifyingPoints: Int!
  spendablePoints: Int!
  pointsToNextTier: Int
  benefits: [String!]!
}

type Query {
  member(id: ID!): Member
}

type PointsTransaction {
  id: ID!
  type: String!
  points: Int!
  source: String!
  occurredAtUtc: String!
}

type TransactionsPage {
  items: [PointsTransaction!]!
  page: Int!
  hasMore: Boolean!
}

type Partner {
  id: ID!
  name: String!
  rate: Float!
}

type Dashboard {
  member: Member
  partners: [Partner!]!
}

extend type Query {
  transactions(memberId: ID!, page: Int! = 0): TransactionsPage!
  partners: [Partner!]!
  dashboard(memberId: ID!): Dashboard!
}

type Reward {
  id: ID!
  name: String!
  cost: Int!
}

type RedemptionResult {
  rewardId: String!
  pointsSpent: Int!
  spendablePoints: Int!
  alreadyApplied: Boolean!
}

extend type Query {
  rewards: [Reward!]!
}

type Mutation {
  redeem(memberId: ID!, rewardId: String!, idempotencyKey: String!): RedemptionResult!
}

type Airport {
  iata: ID!
  icao: String
  name: String!
  city: String!
  country: String!
  countryCode: String!
  degree: Int
  continent: String
  latitude: Float!
  longitude: Float!
  timezone: String
}

type Carrier {
  iata: String!
  name: String!
}

type Destination {
  airport: Airport!
  km: Int!
  min: Int!
  carriers: [Carrier!]!
}

type MapAirport {
  iata: ID!
  latitude: Float!
  longitude: Float!
  degree: Int!
}

type RouteLeg {
  from: Airport!
  to: Airport!
  km: Int!
  min: Int!
  carriers: [Carrier!]!
}

type RoutePath {
  legs: [RouteLeg!]!
  totalKm: Int!
  totalMin: Int!
  hops: Int!
  estimatedPoints: Int
}

enum RouteOptimize {
  KM
  MIN
  HOPS
}

extend type Query {
  airports(query: String!, limit: Int! = 10): [Airport!]!
  airport(iata: ID!): Airport
  airportDestinations(iata: ID!): [Destination!]!
  mapAirports: [MapAirport!]!
  routeSearch(from: ID!, to: ID!, optimize: RouteOptimize! = KM): RoutePath
}
