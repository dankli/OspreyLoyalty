global:
  scrape_interval: 5s

# Symptom-based (RED) alerting — see alert-rules.yml and ADR-0013.
rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs: [{ targets: ["alertmanager:9093"] }]

scrape_configs:
  - job_name: members
    static_configs: [{ targets: ["members:8080"] }]
  - job_name: gateway
    static_configs: [{ targets: ["gateway:4000"] }]
  - job_name: partners
    metrics_path: /actuator/prometheus
    static_configs: [{ targets: ["partners:8080"] }]
  - job_name: points-engine
    static_configs: [{ targets: ["points-engine:8082"] }]
  - job_name: routes
    static_configs: [{ targets: ["routes:8083"] }]
  - job_name: security
    metrics_path: /actuator/prometheus
    static_configs: [{ targets: ["security:8080"] }]
  - job_name: otel-collector
    static_configs: [{ targets: ["otel-collector:8889"] }]
