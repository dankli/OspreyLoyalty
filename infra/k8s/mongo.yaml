apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: osprey
  labels:
    app: mongo
spec:
  serviceName: mongo # the headless Service below — gives the pod a stable DNS identity (mongo-0)
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      securityContext:
        fsGroup: 999 # make the PVC writable by the mongodb group
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: osprey
  labels:
    app: mongo
spec:
  clusterIP: None # headless: required by the StatefulSet; clients still resolve mongo:27017
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
