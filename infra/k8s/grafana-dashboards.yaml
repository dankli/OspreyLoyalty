  osprey-trace-detail.json: |
    {
      "uid": "osprey-trace",
      "title": "Osprey — Trace detail",
      "tags": ["osprey"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "traceId",
            "label": "Trace ID",
            "type": "textbox",
            "query": "",
            "current": { "text": "", "value": "" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Trace $traceId",
          "type": "traces",
          "datasource": { "type": "jaeger", "uid": "osprey-jaeger" },
          "gridPos": { "h": 24, "w": 24, "x": 0, "y": 0 },
          "targets": [
            { "refId": "A", "query": "$traceId" }
          ]
        },
        {
          "id": 2,
          "title": "Logs for this trace",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "osprey-loki" },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 24 },
          "options": { "showTime": true, "wrapLogMessage": true, "enableLogDetails": true, "sortOrder": "Ascending" },
          "targets": [
            {
              "refId": "A",
              "editorMode": "code",
              "queryType": "range",
              "expr": "{namespace=\"osprey\"} |= \"$traceId\" | json | line_format `{{with (or .level .LogLevel)}}{{printf \"%-5s\" .}} {{end}}{{or .Message .message .msg .fields_message __line__}}` | drop __error__, __error_details__"
            }
          ]
        }
      ]
    }
  osprey-traces.json: |
    {
      "uid": "osprey-traces",
      "title": "Osprey — Traces",
      "tags": ["osprey"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "service",
            "label": "Service",
            "type": "custom",
            "query": "members,gateway,partners,security,points-engine",
            "current": { "text": "members", "value": "members" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Recent traces — $service (click a Trace ID to open it in the trace dashboard)",
          "type": "table",
          "datasource": { "type": "jaeger", "uid": "osprey-jaeger" },
          "gridPos": { "h": 20, "w": 24, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "traceID" },
                "properties": [
                  {
                    "id": "links",
                    "value": [
                      {
                        "title": "Open trace dashboard",
                        "url": "/d/osprey-trace/osprey-trace-detail?var-traceId=${__value.raw}&${__url_time_range}"
                      }
                    ]
                  }
                ]
              }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "queryType": "search",
              "service": "$service"
            }
          ]
        }
      ]
    }
  osprey-cluster-nodes.json: |
    {
      "uid": "osprey-cluster-nodes",
      "title": "Osprey Cluster - Nodes",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Nodes Up",
          "datasource": { "type": "prometheus", "uid": "osprey-prom" },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "none" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "osprey-prom" },
              "expr": "count(up{job=\"node-exporter\"} == 1)",
              "legendFormat": "nodes"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Logical CPUs",
          "datasource": { "type": "prometheus", "uid": "osprey-prom" },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "none" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "osprey-prom" },
              "expr": "count(count by (cpu) (node_cpu_seconds_total))",
              "legendFormat": "cores"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Total Memory",
          "datasource": { "type": "prometheus", "uid": "osprey-prom" },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "osprey-prom" },
              "expr": "sum(node_memory_MemTotal_bytes)",
              "legendFormat": "total"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Load (1m)",
          "datasource": { "type": "prometheus", "uid": "osprey-prom" },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "none", "decimals": 2 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "osprey-prom" },
              "expr": "sum(node_load1)",
              "legendFormat": "load1"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "CPU Usage % (per node)",
          "datasource": { "type": "prometheus", "uid": "osprey-prom" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "osprey-prom" },
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Memory Used % (per node)",
          "datasource": { "type": "prometheus", "uid": "osprey-prom" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "osprey-prom" },
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Root Filesystem Used %",
          "datasource": { "type": "prometheus", "uid": "osprey-prom" },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 12 },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "osprey-prom" },
              "expr": "100 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!=\"\"} * 100)",
              "legendFormat": "{{instance}} /"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Load Average",
          "datasource": { "type": "prometheus", "uid": "osprey-prom" },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 12 },
          "fieldConfig": { "defaults": { "unit": "none", "decimals": 2 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "osprey-prom" },
              "expr": "avg(node_load1)",
              "legendFormat": "1m"
            },
            {
              "refId": "B",
              "datasource": { "type": "prometheus", "uid": "osprey-prom" },
              "expr": "avg(node_load5)",
              "legendFormat": "5m"
            },
            {
              "refId": "C",
              "datasource": { "type": "prometheus", "uid": "osprey-prom" },
              "expr": "avg(node_load15)",
              "legendFormat": "15m"
            }
          ]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Network Throughput",
          "datasource": { "type": "prometheus", "uid": "osprey-prom" },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 12 },
          "fieldConfig": { "defaults": { "unit": "Bps" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "osprey-prom" },
              "expr": "sum(rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cali.*|cni.*|flannel.*\"}[5m]))",
              "legendFormat": "receive"
            },
            {
              "refId": "B",
              "datasource": { "type": "prometheus", "uid": "osprey-prom" },
              "expr": "sum(rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cali.*|cni.*|flannel.*\"}[5m]))",
              "legendFormat": "transmit"
            }
          ]
        }
      ]
    }
  osprey-cluster-pods.json: |
