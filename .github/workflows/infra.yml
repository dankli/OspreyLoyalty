name: infra
on:
  push:
    branches: [main]
    paths: ["infra/k8s/**", "infra/terraform/**", ".github/workflows/infra.yml"]
  pull_request:
    paths: ["infra/k8s/**", "infra/terraform/**", ".github/workflows/infra.yml"]

jobs:
  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker run --rm -v "$PWD/infra/k8s:/k8s" ghcr.io/yannh/kubeconform:v0.6.7 -summary -strict -ignore-filename-pattern "README.*" /k8s

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: infra/terraform }
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.*"
      - run: terraform init -backend=false
      - run: terraform validate
      - run: terraform fmt -check
