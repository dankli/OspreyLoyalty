apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: osprey
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: osprey-loyalty-gateway:latest
          imagePullPolicy: Never # kind: image is side-loaded
          ports:
            - containerPort: 4000
          env:
            - name: MEMBERS_URL
              value: http://members:8080
            - name: PARTNERS_URL
              value: http://partners:8080
            - name: ROUTES_URL
              value: http://routes:8083
            - name: PORT
              value: "4000"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318 # Node OTel exports OTLP/HTTP
            - name: OTEL_SERVICE_NAME
              value: gateway
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: osprey
  labels:
    app: gateway
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - port: 4000
      targetPort: 4000
