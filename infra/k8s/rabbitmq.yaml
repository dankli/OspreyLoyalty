apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: osprey
  labels:
    app: rabbitmq
spec:
  serviceName: rabbitmq # headless Service below — stable DNS identity (rabbitmq-0)
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      securityContext:
        fsGroup: 999 # make the PVC writable by the rabbitmq group (the image runs as uid/gid 999)
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672
            - containerPort: 15672
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
          # Readiness runs the real broker check (rabbitmq-diagnostics ping), but ping boots a fresh
          # Erlang CLI node each call and takes ~7-10s under CPU pressure — so give it a generous
          # timeout and period, or a slow-but-healthy node gets pulled from the Service endpoints.
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 3
          # Liveness is a cheap TCP check on the AMQP port. A ping-based liveness would time out under
          # load and let kubelet kill (SIGTERM) a perfectly healthy broker — which then force-closes
          # every client connection and takes the partners service down with it. A socket check can't
          # time out, and "is the listener accepting?" is the right liveness question.
          livenessProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: osprey
  labels:
    app: rabbitmq
spec:
  clusterIP: None # headless: required by the StatefulSet; clients still resolve rabbitmq:5672
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
