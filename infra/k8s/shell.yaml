apiVersion: apps/v1
kind: Deployment
metadata:
  name: shell
  namespace: osprey
  labels:
    app: shell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shell
  template:
    metadata:
      labels:
        app: shell
    spec:
      containers:
        - name: shell
          image: osprey-loyalty-shell:latest
          imagePullPolicy: Never # kind: image is side-loaded
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: shell
  namespace: osprey
  labels:
    app: shell
spec:
  type: ClusterIP
  selector:
    app: shell
  ports:
    - port: 80
      targetPort: 80
