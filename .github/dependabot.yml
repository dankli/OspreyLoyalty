# Dependabot keeps dependencies current across the polyglot fleet. Weekly cadence,
# grouped so a language's minor/patch bumps arrive as one PR rather than a swarm.
version: 2
updates:
  # ── CI actions ──────────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
    groups:
      actions: { patterns: ["*"] }

  # ── C# / .NET (members) ─────────────────────────────────────────────────────
  - package-ecosystem: nuget
    directory: "/services/members"
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      dotnet-minor: { update-types: ["minor", "patch"] }

  # ── Java / Maven ────────────────────────────────────────────────────────────
  - package-ecosystem: maven
    directory: "/services/partners"
    schedule: { interval: weekly }
    groups:
      maven-minor: { update-types: ["minor", "patch"] }
  - package-ecosystem: maven
    directory: "/services/security"
    schedule: { interval: weekly }
    groups:
      maven-minor: { update-types: ["minor", "patch"] }

  # ── Rust / Cargo (points-engine) ────────────────────────────────────────────
  - package-ecosystem: cargo
    directory: "/services/points-engine"
    schedule: { interval: weekly }
    groups:
      cargo-minor: { update-types: ["minor", "patch"] }

  # ── TypeScript / npm ────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: "/services/gateway"
    schedule: { interval: weekly }
    groups:
      npm-minor: { update-types: ["minor", "patch"] }
  - package-ecosystem: npm
    directory: "/frontends/member-portal"
    schedule: { interval: weekly }
    groups:
      npm-minor: { update-types: ["minor", "patch"] }
  - package-ecosystem: npm
    directory: "/frontends/admin-portal"
    schedule: { interval: weekly }
    groups:
      npm-minor: { update-types: ["minor", "patch"] }
  - package-ecosystem: npm
    directory: "/frontends/shell"
    schedule: { interval: weekly }
    groups:
      npm-minor: { update-types: ["minor", "patch"] }

  # ── Container base images ───────────────────────────────────────────────────
  - package-ecosystem: docker
    directories:
      - "/services/members"
      - "/services/gateway"
      - "/services/partners"
      - "/services/security"
      - "/services/points-engine"
      - "/frontends/member-portal"
      - "/frontends/admin-portal"
      - "/frontends/shell"
    schedule: { interval: weekly }
    groups:
      docker: { patterns: ["*"] }
