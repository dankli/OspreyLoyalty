# Promtail on Kubernetes ships every pod's stdout to Loki. Unlike the compose deployment
# (Docker-socket SD in infra/observability/promtail-config.yml), k8s uses the kubelet's pod
# log files plus the Kubernetes API for discovery, so it needs a ServiceAccount + read access
# to pods and a DaemonSet mounting /var/log. The JSON pipeline stays the same, so level /
# correlationId / traceId remain queryable across all services.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: osprey
  labels:
    app: promtail
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
  labels:
    app: promtail
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
  labels:
    app: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: osprey
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: osprey
  labels:
    app: promtail
data:
  config.yml: |
    server:
      http_listen_port: 9080
      log_level: warn
    positions:
      filename: /run/promtail/positions.yaml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator: /
            target_label: __path__
            replacement: /var/log/pods/*$1/*.log
        pipeline_stages:
          - cri: {}
          # Drop health-check & metrics-scrape lines — pure probe/scrape noise, not real traffic.
          - drop:
              expression: ".*(/health|/metrics|/actuator/prometheus).*"
              drop_counter_reason: probe_scrape_noise
          # Best-effort JSON parse so level/correlationId/traceId become queryable labels;
          # non-JSON lines pass through untouched.
          - json:
              expressions:
                level: level
                correlationId: correlationId
                traceId: traceId
          - labels:
              level:
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: osprey
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:3.1.1
          args: ["-config.file=/etc/promtail/config.yml"]
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: http
              containerPort: 9080
          volumeMounts:
            - name: config
              mountPath: /etc/promtail/config.yml
              subPath: config.yml
              readOnly: true
            - name: positions
              mountPath: /run/promtail
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: containers
              mountPath: /var/log/containers
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: positions
          emptyDir: {}
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: containers
          hostPath:
            path: /var/log/containers
