server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # The shell (a different origin) imports remoteEntry.js as an ES module,
    # which the browser fetches in CORS mode (ADR-0004).
    location /assets/ {
        add_header Access-Control-Allow-Origin * always;
        try_files $uri =404;
    }
}
