apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: osprey
  labels:
    app: otel-collector
data:
  # Mirrors infra/observability/otel-collector-config.yml — keep in sync by hand.
  otel-collector-config.yml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 5s
      # Drop health-check / metrics-scrape spans — pure probe & scrape noise, not real requests.
      filter/noise:
        error_mode: ignore
        traces:
          span:
            - 'IsMatch(name, "(?i).*(health|metrics|prometheus).*")'
            - 'attributes["url.path"] != nil and IsMatch(attributes["url.path"], "(?i).*(health|metrics|prometheus).*")'
            - 'attributes["http.target"] != nil and IsMatch(attributes["http.target"], "(?i).*(health|metrics|prometheus).*")'
    exporters:
      otlp/jaeger:
        endpoint: jaeger:4317
        tls:
          insecure: true
      prometheus:
        endpoint: 0.0.0.0:8889
    service:
      telemetry:
        logs:
          level: warn
      pipelines:
        traces:
          receivers: [otlp]
          processors: [filter/noise, batch]
          exporters: [otlp/jaeger]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: osprey
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.109.0
          args: ["--config=/etc/otel-collector-config.yml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: prom-metrics
              containerPort: 8889
          volumeMounts:
            - name: config
              mountPath: /etc/otel-collector-config.yml
              subPath: otel-collector-config.yml
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: osprey
  labels:
    app: otel-collector
spec:
  type: ClusterIP
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: prom-metrics
      port: 8889
      targetPort: 8889
