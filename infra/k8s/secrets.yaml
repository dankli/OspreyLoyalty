# Datastore connection configuration as a Secret, referenced via secretKeyRef from the
# consuming deployments. The VALUES here are demo-public (in-cluster hostnames, authless
# demo datastores) — what this demonstrates is the PATTERN: connection strings live in
# one Secret object, so a real deployment swaps this manifest for an ExternalSecret /
# CSI-mounted entry from a manager without touching any deployment. Tracked as the
# threat model's "secrets in plain manifests" follow-up.
apiVersion: v1
kind: Secret
metadata:
  name: osprey-datastores
  namespace: osprey
  labels: { app: osprey }
type: Opaque
stringData:
  mongo-uri: mongodb://mongo:27017
  mongo-uri-partners: mongodb://mongo:27017/osprey_partners
  neo4j-url: bolt://neo4j:7687
  rabbitmq-host: rabbitmq
