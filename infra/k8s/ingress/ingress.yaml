# Host-based routing for the Osprey stack via Traefik. Hosts use *.osprey.localtest.me, a public
# wildcard domain that resolves to 127.0.0.1 — no /etc/hosts editing needed on Docker Desktop, where
# Traefik's LoadBalancer binds localhost:80. Frontends are built with these URLs (see run-local-k8s)
# and the identity service is reconfigured to issue tokens with issuer http://id.osprey.localtest.me.
#
#   app      -> shell (module-federation host, the entry point)
#   member   -> member-portal remote      admin -> admin-portal remote
#   explorer -> route-explorer remote     routes -> routes API (route graph search; neo4j stays cluster-internal)
#   id       -> security (OIDC issuer)     api   -> gateway (GraphQL BFF)
#   members / partners -> resource servers the admin portal calls directly
#   points-engine -> the standalone Rust calculator (REST /calculate), exposed for direct calls
#   grafana / jaeger / traefik -> ops dashboards
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: osprey
  namespace: osprey
  labels: { app: osprey }
spec:
  ingressClassName: traefik
  # TLS for every host from one wildcard cert. run-local-k8s creates the `osprey-tls` secret from a
  # mkcert-issued cert for *.osprey.localtest.me (locally trusted → no browser warnings, secure
  # context so WebCrypto/PKCE works). If the secret is absent Traefik serves its default self-signed
  # cert instead (browser warning, and cross-origin fetches to id./api. will fail until trusted).
  tls:
    - secretName: osprey-tls
      hosts:
        - app.osprey.localtest.me
        - member.osprey.localtest.me
        - admin.osprey.localtest.me
        - explorer.osprey.localtest.me
        - id.osprey.localtest.me
        - api.osprey.localtest.me
        - members.osprey.localtest.me
        - partners.osprey.localtest.me
        - routes.osprey.localtest.me
        - points-engine.osprey.localtest.me
        - grafana.osprey.localtest.me
        - jaeger.osprey.localtest.me
        - mailpit.osprey.localtest.me
        - traefik.osprey.localtest.me
  rules:
    - host: app.osprey.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: shell, port: { number: 80 } } }
    - host: member.osprey.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: member-portal, port: { number: 80 } } }
    - host: admin.osprey.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: admin-portal, port: { number: 80 } } }
    - host: explorer.osprey.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: route-explorer, port: { number: 80 } } }
    - host: id.osprey.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: security, port: { number: 8080 } } }
    - host: api.osprey.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: gateway, port: { number: 4000 } } }
    - host: members.osprey.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: members, port: { number: 8080 } } }
    - host: partners.osprey.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: partners, port: { number: 8080 } } }
    - host: routes.osprey.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: routes, port: { number: 8083 } } }
    - host: points-engine.osprey.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: points-engine, port: { number: 8082 } } }
    - host: grafana.osprey.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: grafana, port: { number: 3000 } } }
    - host: jaeger.osprey.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: jaeger, port: { number: 16686 } } }
    - host: mailpit.osprey.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: mailpit, port: { number: 8025 } } }
    - host: traefik.osprey.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: traefik-dashboard, port: { number: 8080 } } }
