apiVersion: apps/v1
kind: Deployment
metadata:
  name: security
  namespace: osprey
  labels:
    app: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: security
  template:
    metadata:
      labels:
        app: security
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: security
          image: osprey-loyalty-security:latest
          imagePullPolicy: Never # kind: image is side-loaded
          ports:
            - containerPort: 8080
          env:
            - name: OIDC_ISSUER
              value: http://localhost:9000
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318 # Java OTel defaults to OTLP/HTTP → the collector's HTTP receiver
            - name: OTEL_SERVICE_NAME
              value: security
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001 # non-root `app` user baked into the image
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: security
  namespace: osprey
  labels:
    app: security
spec:
  type: ClusterIP
  selector:
    app: security
  ports:
    - port: 8080
      targetPort: 8080
