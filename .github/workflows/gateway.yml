name: gateway
on:
  push:
    branches: [main]
    paths: ["services/gateway/**", ".github/workflows/gateway.yml"]
  pull_request:
    paths: ["services/gateway/**", ".github/workflows/gateway.yml"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: services/gateway }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm test
      - run: npm run build
