apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: osprey
  labels:
    app: prometheus
data:
  # Mirrors infra/observability/prometheus.yml — the service names + ports match k8s, so it is
  # reused verbatim. actuator/metrics endpoints stay public even with auth on (permitAll).
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: members
        static_configs: [{ targets: ["members:8080"] }]
      - job_name: gateway
        static_configs: [{ targets: ["gateway:4000"] }]
      - job_name: partners
        metrics_path: /actuator/prometheus
        static_configs: [{ targets: ["partners:8080"] }]
      - job_name: points-engine
        static_configs: [{ targets: ["points-engine:8082"] }]
      - job_name: security
        metrics_path: /actuator/prometheus
        static_configs: [{ targets: ["security:8080"] }]
      - job_name: otel-collector
        static_configs: [{ targets: ["otel-collector:8889"] }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: osprey
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args: ["--config.file=/etc/prometheus/prometheus.yml"]
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: osprey
  labels:
    app: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
