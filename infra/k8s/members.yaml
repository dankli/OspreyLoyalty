apiVersion: apps/v1
kind: Deployment
metadata:
  name: members
  namespace: osprey
  labels:
    app: members
spec:
  replicas: 1
  selector:
    matchLabels:
      app: members
  template:
    metadata:
      labels:
        app: members
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: members
          image: osprey-loyalty-members:latest
          imagePullPolicy: Never # kind: image is side-loaded
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__Mongo
              value: mongodb://mongo:27017
            - name: RabbitMq__Host
              value: rabbitmq
            - name: SeedDemoData
              value: "true"
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317
            - name: OTEL_SERVICE_NAME
              value: members
            # Auth is off by default; run-local-k8s.* turns it on at deploy time with
            # `kubectl set env` (RS256/JWKS), so no auth env is baked here. See ADR-0007.
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1654 # APP_UID in the chiseled .NET runtime image
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: members
  namespace: osprey
  labels:
    app: members
spec:
  type: ClusterIP
  selector:
    app: members
  ports:
    - port: 8080
      targetPort: 8080
